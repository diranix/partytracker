limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name partytracker.fun www.partytracker.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name partytracker.fun www.partytracker.fun;

    ssl_certificate     /etc/letsencrypt/live/partytracker.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/partytracker.fun/privkey.pem;

    server_tokens off;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options     "nosniff"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # Rate-limit API only
    location /api/ {
        limit_req zone=api burst=30 nodelay;

        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;

        # Forward real client IP to FastAPI logs
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Reasonable timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Upload support (photos)
        client_max_body_size 20m;
    }

    location /docs {
        proxy_pass         http://backend:8000/docs;
        proxy_set_header   Host $host;
    }

    location /openapi.json {
        proxy_pass         http://backend:8000/openapi.json;
        proxy_set_header   Host $host;
    }

    location /redoc {
        proxy_pass         http://backend:8000/redoc;
        proxy_set_header   Host $host;
    }

    location / {
        proxy_pass         http://frontend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Vite HMR websocket support
        proxy_connect_timeout 10s;
        proxy_read_timeout    3600s;
    }
}
