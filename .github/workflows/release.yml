name: Release to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check no secrets in repo
        run: |
          for f in .env .env.local .env.production .env.staging; do
            if [ -f "$f" ]; then
              echo "Secret file found in repository: $f"
              exit 1
            fi
          done
          echo "No secret files found - OK"

      - name: Install security tools
        run: |
          pip install bandit flake8 pip-audit

      - name: Lint (flake8)
        run: |
          flake8 backend/app --max-line-length=120 --ignore=E501,W292

      - name: SAST (bandit)
        run: |
          bandit -r backend/app -ll

      - name: SCA (pip-audit)
        run: |
          pip-audit -r backend/requirements.txt

      - name: Deploy to server
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/diranix/partytracker
            git pull origin main
            docker compose up -d --build
            docker compose restart nginx

      - name: Smoke test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          sleep 10
          curl -f https://partytracker.fun/api/ || exit 1
